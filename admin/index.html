<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Household Intelligence</title>
    <link rel="stylesheet" href="../../lib/css/adapter.css">
    <script type="text/javascript" src="../../lib/js/adapter-settings.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; background: #fafafa; }
        .section { margin-bottom: 16px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: white; }
        h3 { margin-top: 0; color: #333; font-size: 15px; }
        label.field-label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; color: #555; }
        input[type=text], input[type=number], input[type=password], select {
            width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 3px;
            box-sizing: border-box; margin-bottom: 8px; font-size: 13px;
        }
        input[type=text]:focus, input[type=number]:focus, select:focus {
            border-color: #2196F3; outline: none;
        }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 180px; }
        .col-sm { flex: 0 0 160px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
        th { background: #f0f0f0; padding: 7px 8px; text-align: left; border: 1px solid #ddd; font-size: 12px; font-weight: bold; }
        td { padding: 4px 6px; border: 1px solid #eee; }
        td input[type=text], td select {
            width: 100%; padding: 4px 6px; border: 1px solid #ddd; border-radius: 2px;
            margin: 0; font-size: 12px;
        }
        .btn { padding: 6px 14px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
        .btn-add { background: #4CAF50; color: white; margin-bottom: 8px; }
        .btn-del { background: #f44336; color: white; padding: 3px 8px; font-size: 11px; }
        .info-text { color: #777; font-size: 12px; margin-bottom: 10px; line-height: 1.4; }
        .hidden { display: none; }
        #dpCount { font-weight: bold; color: #2196F3; font-size: 13px; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .checkbox-row input[type=checkbox] { margin: 0; }
    </style>
</head>
<body>

<div class="section">
    <h3>🤖 LLM Backend</h3>
    <div class="row">
        <div class="col">
            <label class="field-label">Backend</label>
            <select id="llmBackend" onchange="toggleBackend()">
                <option value="ollama">Ollama (lokal, empfohlen)</option>
                <option value="openai">OpenAI (Cloud)</option>
            </select>
        </div>
        <div class="col" id="col_ollamaHost">
            <label class="field-label">Ollama Host URL</label>
            <input type="text" id="ollamaHost" placeholder="http://192.168.178.170:11434">
        </div>
        <div class="col" id="col_ollamaModel">
            <label class="field-label">Ollama Modell</label>
            <input type="text" id="ollamaModel" placeholder="phi4-mini">
        </div>
        <div class="col hidden" id="col_openaiKey">
            <label class="field-label">OpenAI API Key</label>
            <input type="password" id="openaiApiKey">
        </div>
        <div class="col hidden" id="col_openaiModel">
            <label class="field-label">OpenAI Modell</label>
            <select id="openaiModel">
                <option value="gpt-4o-mini">GPT-4o mini (günstig)</option>
                <option value="gpt-4o">GPT-4o (besser)</option>
            </select>
        </div>
    </div>
    <div class="row">
        <div class="col-sm">
            <label class="field-label">Max. Tokens</label>
            <input type="number" id="maxTokens" min="500" max="4000">
        </div>
        <div class="col-sm">
            <label class="field-label">Timeout (Sekunden)</label>
            <input type="number" id="timeoutSeconds" min="60" max="600">
        </div>
        <div class="col">
            <label class="field-label">Analyse-Intervall</label>
            <select id="analysisIntervalHours">
                <option value="1">Jede Stunde</option>
                <option value="3">Alle 3 Stunden</option>
                <option value="6">Alle 6 Stunden (empfohlen)</option>
                <option value="24">Einmal täglich</option>
            </select>
        </div>
    </div>
</div>

<div class="section">
    <h3>📡 Datenpunkte <span id="dpCount"></span></h3>
    <p class="info-text">Datenpunkte die der Adapter überwacht und an die KI übergibt. Die automatische Erkennung findet beim Start alle relevanten States.</p>
    <div class="checkbox-row">
        <input type="checkbox" id="autoDiscover">
        <label for="autoDiscover">Automatische Erkennung beim nächsten Start (überschreibt manuelle Liste)</label>
    </div>
    <button class="btn btn-add" onclick="addRow()">+ Datenpunkt hinzufügen</button>
    <table id="dpTable">
        <thead>
            <tr>
                <th style="width:38%">Datenpunkt ID</th>
                <th style="width:26%">Bezeichnung</th>
                <th style="width:20%">Kategorie</th>
                <th style="width:8%">Einheit</th>
                <th style="width:8%"></th>
            </tr>
        </thead>
        <tbody id="dpBody"></tbody>
    </table>
</div>

<div class="section">
    <h3>🔔 Benachrichtigungen</h3>
    <div class="row">
        <div class="col">
            <div class="checkbox-row">
                <input type="checkbox" id="notifyTelegram" onchange="toggleTelegram()">
                <label for="notifyTelegram">Telegram (benötigt Telegram Adapter)</label>
            </div>
            <input type="text" id="telegramUser" placeholder="Benutzername (leer = alle)" class="hidden">
        </div>
        <div class="col">
            <div class="checkbox-row">
                <input type="checkbox" id="notifyPushover">
                <label for="notifyPushover">Pushover</label>
            </div>
        </div>
        <div class="col">
            <div class="checkbox-row">
                <input type="checkbox" id="notifyEmail" onchange="toggleEmail()">
                <label for="notifyEmail">E-Mail</label>
            </div>
            <input type="text" id="emailTo" placeholder="empfaenger@example.com" class="hidden">
        </div>
    </div>
</div>

<script>
const CATEGORIES = ['power','temperature','heating','water','light','presence','security','solar','other'];

function toggleBackend() {
    const v = document.getElementById('llmBackend').value;
    document.getElementById('col_ollamaHost').classList.toggle('hidden', v !== 'ollama');
    document.getElementById('col_ollamaModel').classList.toggle('hidden', v !== 'ollama');
    document.getElementById('col_openaiKey').classList.toggle('hidden', v !== 'openai');
    document.getElementById('col_openaiModel').classList.toggle('hidden', v !== 'openai');
}

function toggleTelegram() {
    document.getElementById('telegramUser').classList.toggle('hidden',
        !document.getElementById('notifyTelegram').checked);
}

function toggleEmail() {
    document.getElementById('emailTo').classList.toggle('hidden',
        !document.getElementById('notifyEmail').checked);
}

function addRow(dp) {
    const tbody = document.getElementById('dpBody');
    const tr = document.createElement('tr');
    const catOptions = CATEGORIES.map(c =>
        `<option value="${c}" ${dp && dp.category === c ? 'selected' : ''}>${c}</option>`
    ).join('');
    tr.innerHTML = `
        <td><input type="text" class="dp-id" value="${dp ? escHtml(dp.id) : ''}" placeholder="adapter.0.device.STATE"></td>
        <td><input type="text" class="dp-label" value="${dp ? escHtml(dp.label) : ''}" placeholder="Bezeichnung"></td>
        <td><select class="dp-category">${catOptions}</select></td>
        <td><input type="text" class="dp-unit" value="${dp ? escHtml(dp.unit||'') : ''}" placeholder="W"></td>
        <td style="text-align:center"><button class="btn btn-del" onclick="this.closest('tr').remove();updateCount();M.emit('changed')">✕</button></td>
    `;
    tbody.appendChild(tr);
    updateCount();
    // notify ioBroker that something changed
    tr.querySelectorAll('input, select').forEach(el => el.addEventListener('change', () => M.emit('changed')));
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function updateCount() {
    const rows = document.querySelectorAll('#dpBody tr').length;
    document.getElementById('dpCount').textContent = `(${rows} Datenpunkte)`;
}

function getDatapoints() {
    const result = [];
    document.querySelectorAll('#dpBody tr').forEach(tr => {
        const id = tr.querySelector('.dp-id').value.trim();
        if (!id) return;
        result.push({
            id,
            label: tr.querySelector('.dp-label').value.trim() || id.split('.').pop(),
            category: tr.querySelector('.dp-category').value,
            unit: tr.querySelector('.dp-unit').value.trim(),
        });
    });
    return result;
}

// ── ioBroker adapter-settings integration ──────────────────────────────────
function load(settings, onChange) {
    if (!settings) settings = {};

    document.getElementById('llmBackend').value            = settings.llmBackend || 'ollama';
    document.getElementById('ollamaHost').value            = settings.ollamaHost || 'http://192.168.178.170:11434';
    document.getElementById('ollamaModel').value           = settings.ollamaModel || 'phi4-mini';
    document.getElementById('openaiApiKey').value          = settings.openaiApiKey || '';
    document.getElementById('openaiModel').value           = settings.openaiModel || 'gpt-4o-mini';
    document.getElementById('maxTokens').value             = settings.maxTokens || 1500;
    document.getElementById('timeoutSeconds').value        = settings.timeoutSeconds || 300;
    document.getElementById('analysisIntervalHours').value = settings.analysisIntervalHours || 6;
    document.getElementById('autoDiscover').checked        = settings.autoDiscover !== false;
    document.getElementById('notifyTelegram').checked      = !!settings.notifyTelegram;
    document.getElementById('telegramUser').value          = settings.telegramUser || '';
    document.getElementById('notifyPushover').checked      = !!settings.notifyPushover;
    document.getElementById('notifyEmail').checked         = !!settings.notifyEmail;
    document.getElementById('emailTo').value               = settings.emailTo || '';

    toggleBackend();
    toggleTelegram();
    toggleEmail();

    // Load datapoints table
    document.getElementById('dpBody').innerHTML = '';
    try {
        const raw = settings.datapointsJson;
        const dps = raw ? (typeof raw === 'string' ? JSON.parse(raw) : raw) : [];
        dps.forEach(dp => addRow(dp));
    } catch(e) { console.error('datapoints parse error', e); }
    updateCount();

    // Watch all inputs for changes
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('change', onChange);
        el.addEventListener('input', onChange);
    });
}

function save(callback) {
    callback({
        llmBackend:            document.getElementById('llmBackend').value,
        ollamaHost:            document.getElementById('ollamaHost').value,
        ollamaModel:           document.getElementById('ollamaModel').value,
        openaiApiKey:          document.getElementById('openaiApiKey').value,
        openaiModel:           document.getElementById('openaiModel').value,
        maxTokens:             parseInt(document.getElementById('maxTokens').value) || 1500,
        timeoutSeconds:        parseInt(document.getElementById('timeoutSeconds').value) || 300,
        analysisIntervalHours: parseInt(document.getElementById('analysisIntervalHours').value) || 6,
        autoDiscover:          document.getElementById('autoDiscover').checked,
        autoDiscoveryDone:     false,
        datapointsJson:        JSON.stringify(getDatapoints()),
        notifyTelegram:        document.getElementById('notifyTelegram').checked,
        telegramUser:          document.getElementById('telegramUser').value,
        notifyPushover:        document.getElementById('notifyPushover').checked,
        notifyEmail:           document.getElementById('notifyEmail').checked,
        emailTo:               document.getElementById('emailTo').value,
    });
}
</script>
</body>
</html>
